<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the.drone.shot</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- HERO SECTION -->
    <section class="hero">
    <video autoplay muted loop class="hero-video">
        <source src="assets/videos/hero.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-text fade-in">
        <h1>THE DRONE SHOT</h1>
        <p>Elevated Perspective</p>

        <a href="#portfolio" class="btn-primary">Portfolio ansehen</a>
    </div>
    </section>

  <!-- PARALLAX SECTION -->
  <section class="parallax" data-speed="0.3">
    <div class="content fade-in">
      <h2>Cinematic FPV & Drohnenfotografie</h2>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section class="portfolio">
    <h2>Portfolio</h2>
    <div class="grid">
      <img src="assets/images/sample1.jpg" class="fade-in">
      <img src="assets/images/sample2.jpg" class="fade-in">
      <img src="assets/images/sample3.jpg" class="fade-in">
      <img src="assets/images/sample4.jpg" class="fade-in">
    </div>
  </section>

  <!-- Kontakt -->
  <section class="contact fade-in">
    <h2>Kontakt</h2>
    <form>
      <input type="text" placeholder="Name">
      <input type="email" placeholder="E-Mail">
      <textarea placeholder="Nachricht"></textarea>
      <button type="submit">Senden</button>
    </form>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="js/parallax.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
