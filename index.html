<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Drone Shot - Cinematic FPV & Drohnenfotografie in der Schweiz. Immobilien, Events, Imagefilme und sociale Media Content.">
  <meta name="keywords" content="Drohne, FPV, Fotografie, Schweiz, St. Gallen, Säntisblick, Säntis, kybun, Cinematic">
  <meta property="og:title" content="The Drone Shot - Elevated Perspective">
  <meta property="og:description" content="Professionelle Drohnenfotografie und FPV-Cinematic">
  <meta property="og:type" content="website">
  <title>the.drone.shot - Drohnenfotografie & FPV-Cinematic</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/apple-touch-icon.png">

</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- HERO SECTION -->
    <section class="hero">
    <video autoplay muted loop class="hero-video" aria-label="FPV Drohnen Cinematic-Video">
        <source src="assets/videos/hero.mp4" type="video/mp4">
        Dein Browser unterstützt HTML5 Videos nicht.
    </video>

    <video autoplay muted loop playsinline preload="none" class="hero-video">
      <source src="assets/videos/hero.mp4" type="video/mp4">
    </video>


    <div class="hero-overlay"></div>

    <div class="hero-text fpv-reveal left">
        <h1 class="hero-title">
            <span>THE DRONE</span>
            <span class="highlight">SHOT</span>
        </h1>

        <p class="hero-sub">Elevated Perspective</p>

        <div class="hero-actions">
          <a href="#portfolio" class="btn-primary">Portfolio ansehen</a>
          <a href="#contact" class="btn-secondary">Kontakt</a>
        </div>
    </div>

    <!-- SCROLL INDICATOR -->
    <div class="scroll-indicator">
        <div class="scroll-line"></div>
    </div>

    </section>

  <!-- PARALLAX SECTION -->
  <section class="parallax" data-speed="0.3">
    <div class="content fade-in">
      <h2>Cinematic FPV & Drohnenfotografie</h2>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section class="portfolio" id="portfolio">
    <h2>Portfolio</h2>
    <div class="portfolio-grid">
      <!-- Bilder werden dynamisch aus portfolio.json geladen -->
    </div>
  </section>

  <!-- INSTAGRAM FEED -->
  <section class="instagram-section">
    <h2>Instagram</h2>
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-b8dd2e85-9692-4b55-baef-f29c10b304c8" data-elfsight-app-lazy></div>
  </section>

  <!-- Kontakt -->
  <section id="contact" class="contact fpv-reveal"></section>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="js/parallax.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script src="js/portfolio.js"></script>

  <!-- Komponenten Loader -->
<script>
  fetch("components/header.html")
    .then(res => res.text())
    .then(data => document.getElementById("header").innerHTML = data);

  fetch("components/contact.html")
    .then(res => res.text())
    .then(data => {
      const contactSection = document.getElementById("contact");
      contactSection.innerHTML = data;
      // Animation für nachgeladene Elemente aktivieren
      contactSection.classList.add('visible');
      // Formular-Handler nach dem Laden initialisieren
      if (window.initContactForm) {
        window.initContactForm();
      }
    });

  fetch("components/footer.html")
    .then(res => res.text())
    .then(data => document.getElementById("footer").innerHTML = data);
</script>

</body>
</html>
